name: Create beta release

on:
  workflow_dispatch:
    inputs:
      next:
        description: "The next increment to create the release for"
        required: true
        default: "minor"
        type: choice
        options:
          - major
          - minor

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --force --tags

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: false

      - name: Set up Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get hash
        shell: bash
        run: |
          HASH=$(git rev-parse --short "$GITHUB_SHA")
          echo "HASH=$HASH" >> $GITHUB_ENV

      - name: Get the next potential version
        id: next-tag
        uses: miniscruff/changie-action@5036dffa79ffc007110dc7f75eca7ef72780e147 # v2.1.0
        with:
          version: latest
          args: next -p beta-${{ env.HASH }} ${{ github.event.inputs.next }}

      - name: Output changes
        uses: miniscruff/changie-action@5036dffa79ffc007110dc7f75eca7ef72780e147 # v2.1.0
        id: changelog
        with:
          version: latest
          args: batch --dry-run -p beta-${{ env.HASH }} ${{ github.event.inputs.next }}

      - name: Save ChangeLog to file
        id: save_changes
        run: |
          tmpfile=$(mktemp)
          echo "${{ steps.changelog.outputs.output }}" > $tmpfile
          echo  "changelog_file=$tmpfile"  >> $GITHUB_OUTPUT
        shell: bash

      - name: GoReleaser
        uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 # v7.0.0
        with:
          args: release --clean --skip=validate --release-notes ${{ steps.save_changes.outputs.changelog_file }}
        env:
          GORELEASER_CURRENT_TAG: ${{ steps.next-tag.outputs.output }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOPATH: ${{ env.GOPATH }}
          CHOCOLATEY_API_KEY: ${{ secrets.CHOCOLATEY_API_KEY }}
          SKIP_UPLOAD: true

      - name: Upload release
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: mach-composer-plugin-wundergraph
          path: dist/*
